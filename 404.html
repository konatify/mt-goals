  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #313338;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      color: #e2b714;
      font-size: 2.2rem;
      font-weight: 600;

      margin-bottom: 10px;
    }

    }

    header a.mt-link {
      display: inline-flex;
      align-items: center;

      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 6px;
    }
    header a.mt-link:hover {
      color: rgba(255,255,255,0.8);
    }
    header a.mt-link svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
    }

    .error-code {
      color: #e2b714;
      font-size: 6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .error-msg {
      color: rgba(255,255,255,0.5);
      font-size: 0.92rem;
      font-weight: 300;
    }
