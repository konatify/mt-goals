<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monkeytype Goals</title>
  <link rel="icon" type="image/png" href="https://www.mtgoals.cc/images/mtg.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #313338;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .logo {
      height: 70px;
      width: auto;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
    }

    header a.mt-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 6px;
    }
    header a.mt-link:hover {
      color: rgba(255,255,255,0.8);
    }
    header a.mt-link svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .noscript-card {
      background-color: #2b2d31;
      border-radius: 8px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .noscript-card .title {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .noscript-card .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.82rem;
      font-weight: 300;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <img src="mtgoals.cc/images/mtgoals.png" alt="Monkeytype Goals" class="logo" />
  <p>Not promoted or endorsed by Miodec.</p>
  <a class="mt-link" href="https://monkeytype.com" target="_blank" rel="noopener noreferrer">
    monkeytype.com
    <svg viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="none">
      <g fill="rgba(255,255,255,0.5)" transform="translate(85.333333, 64.000000)">
        <path d="M128,63.999444 L128,106.666444 L42.6666667,106.666667 L42.6666667,320 L256,320 L256,234.666444 L298.666,234.666444 L298.666667,362.666667 L4.26325641e-14,362.666667 L4.26325641e-14,64 L128,63.999444 Z M362.666667,1.42108547e-14 L362.666667,170.666667 L320,170.666667 L320,72.835 L143.084945,249.751611 L112.915055,219.581722 L289.83,42.666 L192,42.6666667 L192,1.42108547e-14 L362.666667,1.42108547e-14 Z"/>
      </g>
    </svg>
  </a>
</header>

<div class="container">
  <div class="noscript-card">
    <span class="title">No JavaScript!</span>
    <span class="subtitle">Please enable JavaScript so Monkeytype Goals can work correctly.</span>
  </div>
</div>

</body>
</html>
